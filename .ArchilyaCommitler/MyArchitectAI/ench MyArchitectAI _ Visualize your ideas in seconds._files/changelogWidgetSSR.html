      </style><div><div class="p-2 flex w-full fixed top-0 -mb-8  items-center z-50 justify-center text-center " style="background:#000000"> <p class="text-xs text-white truncate max-w-[230px] font-semibold tracking-wide">Latest changes</p></div><div style="height:auto"><div id="top-main" class="pt-8 pb-8 dark:bg-secondary custom-scrollbar scrollbar-thumb-gray-100 scrollbar-track-gray-50 dark:scrollbar-thumb-dark-accent dark:scrollbar-track-border/50 overflow-x-hidden w-full bg-white max-w-[340px] max-h-[350px] overscroll-contain text-gray-600"><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">Set the mood of your renders in one click</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">The new Set Atmosphere tool (available in the Edit tab) lets you quickly adjust the lighting and weather conditions of your renders using presets. For exteriors, switch between time of day, season, and weather presets to set the perfect mood. For interiors, pick from natural and artificial lighting presets to control how the space is lit. Go to the Edit mode, select Set Atmosphere from the sidebar, then choose a preset and click Apply. You can also combine the exterior presets for more control.</p></button><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">Automatic prompts</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">The new auto-prompt feature (available in the Render tab) analyzes your uploaded image and generates a full prompt in one click, so you get more accurate results without having to write the prompt yourself. That said, our engine still renders great without prompts in most cases, so start there. If the first result misses something, click the auto-prompt icon to let our AI describe the input image for you, then regenerate for a more accurate result.</p></button><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">16 new conceptual styles</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">The conceptual style library just got bigger. We’ve added 16 new presets, so you've got more non-photorealistic looks to play with for sketches, elevations, and concept boards. New presets include Digital Painting, Ink Wash, Xerox Collage, Ukiyo-e, Blueprint, and more. Pick the Apply Style mode, switch to Conceptual, and scroll through to see them all.</p></button><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">Animations are live!</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">The Animate feature lets you turn a single image into a short video or create a smooth transition between two images. Pick a camera motion preset or write a custom prompt to control exactly how the camera moves and how the environment behaves. More prompt examples and animation best practices in this guide. Animation credits are included with paid plans and vary by subscription tier. Credits reset monthly, including for annual subscribers. Starter: Animations not available Pro: 20 animations/month Studio: 50 animations/month Scale: 125 animations/month If you need any help or tips, we’re always there for you in the live chat!</p></button><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">Rendering engine upgrade</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">The new rendering engine just went live, and it's a big step up. Here's what's changed: More realistic textures, vegetation, lighting, and reflections Higher accuracy overall Text and logos now render without distortions Better prompt understanding As a bonus, it doubles as an enhancer, just like the previous version (no extra settings needed). This update only applies to the core rendering engine ("preserve existing textures" mode). Visual Styles, Editing tools, and Enhancer are unchanged (but will be soon upgraded too).</p></button><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">Revised interface</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">Thanks to everyone who shared feedback on the new interface. It was incredibly useful, and we've already made improvements based on what you told us. Here's what changed: 1. Faster image uploads Select the tool and you're in. No more upload pop-up in between. 2. New 'Rendering Mode' setting Now it's clear which settings to use when visualizing a textured design, and which to use when experimenting with different styles on black and white image inputs. 3. Lock your source image Set any image as the 'Render source' to generate variations without clicking back through your history each time. In Edit mode, your last generation is automatically used as the source. 4. Starting a new session is easier New "Start new session" button above the history pane makes it easier to upload a new image and start fresh. 5. Everything's bigger Lastly, the entire interface is now slightly larger, making all controls easier to see and interact with. This update exists because you told us what wasn't working well. Got more ideas? Reply to this announcement or let us know through the live chat. Happy rendering!</p></button><button class="unstyled-button w-full p-2 border-l-4 cursor-pointer border-t -mt-px dark:border-t-border border-t-gray-100/60 dark:hover:bg-border hover:bg-gray-100/60 main-transition 
                           dark:border-l-background-accent/60 border-gray-100"><p class="text-sm font-semibold line-clamp-1 dark:text-white">The all-new MyArchitectAI is here</p><p class="text-xs pr-2 font-medium line-clamp-2 mt-0.5 dark:text-gray-200 text-gray-400">We’re excited to share what we’ve been building over the past few months. We redesigned MyArchitectAI from the ground up to make your workflow more efficient than ever. Here’s what’s new: Your full generation history is now automatically saved to your account, including settings. You can organize everything into Sessions and Projects, so nothing gets lost. You can start from any tool: Render, Edit, or Enhance directly, without having to render first like before. You can move freely between tools as you work. Edit by Prompt is now available on mobile devices. To see how it all fits together, watch this quick walkthrough: Try the new experience and tell us what you think. What works well? What feels missing? Your honest feedback helps us decide what to build next. And if you need a hand, check out the updated tutorials page, or reach out via live chat anytime. Happy rendering!</p></button></div><div class="fixed bottom-0 flex items-center justify-between w-full p-2 px-3 bg-white border-t dark:border-dark-accent dark:bg-border" style="opacity:1"><a href="https://featurebase.app/?utm_campaign=myarchitectai&amp;utm_content=changelog-widget&amp;utm_medium=referral&amp;utm_source=powered-by&amp;utm_id=68dd017917a011ec8bf00d5c" target="_blank" rel="noreferrer"><span class="text-[11px] main-transition hover:text-gray-600 text-gray-400 dark:text-gray-200/80 dark:hover:text-gray-100 flex items-center justify-center cursor-pointer font-semibold">Powered by Featurebase</span></a><a target="_blank" rel="noreferrer" href="https://help.myarchitectai.com/changelog?jwt=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJvcmdhbml6YXRpb24iOiJteWFyY2hpdGVjdGFpIiwiZmVhdHVyZWJhc2VKd3QiOiJleUpoYkdjaU9pSklVekkxTmlJc0luUjVjQ0k2SWtwWFZDSjkuZX .jpeg\" data-featurebase-content-filename=\"set-atmosphere.jpg\" src=\"https://68dd017917a011ec8bf00d5c.featurebase-attachments.com/c/changelog/6a01ba2e6bf2cc26835e6394/019e16fd-761a-716d-bf44-7cb2d0bd763e/b64u-c2V0LWF0bW9zcGhlcmUuanBn.jpeg?X-Amz-Expires=3600\u0026amp;X-Amz-Date=20260527T220000Z\u0026amp;X-Amz-Algorithm=AWS4-HMAC-SHA256\u0026amp;X-Amz-Credential=DO801TYC4FCVNNEKURKM%2F20260527%2Ffra1%2Fs3%2Faws4_request\u0026amp;X-Amz-SignedHeaders=host\u0026amp;X-Amz-Signature=98da7f90c20a1c9486c13810b2f13bedbedfdd6f43a842bd2f426cee2a07aa7c\"\u003e\u003cp class=\"font-claude-response-body break-words whitespace-normal leading-[1.7]\"\u003eFor exteriors, switch between time of day, season, and weather presets to set the perfect mood. For interiors, pick from natural and artificial lighting presets to control how the space is lit.\u003c/p\u003e\u003cp class=\"font-claude-response-body break-words whitespace-normal leading-[1.7]\"\u003eGo to the \u003cstrong\u003eEdit\u003c/strong\u003e mode, select \u003cstrong\u003eSet Atmosphere\u003c/strong\u003e from the sidebar, then choose a preset and click \u003cstrong\u003eApply\u003c/strong\u003e.\u003c/p\u003e\u003cp class=\"font-claude-response-body break-words whitespace-normal leading-[1.7]\"\u003eYou can also combine the exterior presets for more control.\u003c/p\u003e\u003cimg data-width=\"50%\" data-align=\"center\" alt=\"\" data-featurebase-content-key=\"68dd017917a011ec8bf00d5c/changelog/6a01ba2e6bf2cc26835e6394/019e1701-26b2-791e-be80-8c60c224813c/b64u-YXRtb3NwaGVyZSAoMSkuanBn.jpeg\" data-featurebase-content-filename=\"atmosphere (1).jpg\" src=\"https://68dd017917a011ec8bf00d5c.featurebase-attachments.com/c/changelog/6a01ba2e6bf2cc26835e6394/019e1701-26b2-791e-be80-8c60c224813c/b64u-YXRtb3NwaGVyZSAoMSkuanBn.jpeg?X-Amz-Expires=3600\u0026amp;X-Amz-Date=20260527T220000Z\u0026amp;X-Amz-Algorithm=AWS4-HMAC-SHA256\u0026amp;X-Amz-Credential=DO801TYC4FCVNNEKURKM%2F20260527%2Ffra1%2Fs3%2Faws4_request\u0026amp;X-Amz-SignedH g to render first like before.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eYou can move freely between tools as you work.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eEdit by Prompt is now available on mobile devices.\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eTo see how it all fits together, watch this quick walkthrough:\u003c/p\u003e\u003cdiv class=\"iframe-wrapper\"\u003e\u003ciframe src=\"https://www.youtube-nocookie.com/embed/4UjhI5DyCLs\" frameborder=\"0\" allowfullscreen=\"true\" class=\"w-full shadow aspect-video rounded-xl\" data-youtube-video=\"\"\u003e\u003c/iframe\u003e\u003c/div\u003e\u003cp\u003eTry the new experience and tell us what you think. What works well? What feels missing? Your honest feedback helps us decide what to build next.\u003c/p\u003e\u003cp\u003eAnd if you need a hand, check out the updated \u003ca target=\"\" rel=\"noopener noreferrer nofollow\" class=\"link\" href=\"https://www.myarchitectai.com/rendering-tutorials\"\u003etutorials page\u003c/a\u003e, or reach out via live chat anytime.\u003c/p\u003e\u003cp\u003eHappy rendering!\u003c/p\u003e","state":"live","locale":"en","isDraftDiffersFromLive":false,"isPublished":true,"availableLocales":["en"],"publishedLocales":["en"],"slugs":{"en":"the-all-new-myarchitectai-is-here"}}],"page":1,"limit":7,"totalPages":4,"totalResults":22}],"/v1/organization":{"supportEmailSignature":{"contentJson":null,"contentHtml":null,"logoUrl":null,"enabled":true,"logoHeight":90,"logoPosition":"left","logoWidth":90},"supportSenderNameCustom":null,"name":"myarchitectai","displayName":"MyArchitectAI","color":"#000000","migratedPostCategories":false,"categories":["💡 Feature Request"],"trialExtendCount":0,"widget":{"cards":[],"color":"#4F46E5","description":"How can we help?","title":"Hey {name|there}! 👋","options":{"voteOnFeatures":true,"showRoadmap":true,"showChangelog":false,"showMainPage":true}},"owner":"68c7fee7f6514f64de424ee2","whitelabel":false,"language":"en","settings"
